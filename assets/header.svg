<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.5" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#00180b"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame"><rect width="900" height="240" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="240" fill="url(#bgGrad)"/>

    <!-- matrix rain -->
    <g font-family="monospace" font-size="14" fill="#00ff41">
      <g opacity="0.16">
        <text x="40" y="0">ア<tspan x="40" dy="18">0</tspan><tspan x="40" dy="18">イ</tspan><tspan x="40" dy="18">1</tspan><tspan x="40" dy="18">ウ</tspan><tspan x="40" dy="18">7</tspan><tspan x="40" dy="18">カ</tspan><tspan x="40" dy="18">X</tspan><tspan x="40" dy="18">0</tspan><tspan x="40" dy="18">サ</tspan><tspan x="40" dy="18">1</tspan><tspan x="40" dy="18">タ</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="7s" begin="-1s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.10">
        <text x="115" y="0">1<tspan x="115" dy="18">ナ</tspan><tspan x="115" dy="18">0</tspan><tspan x="115" dy="18">ミ</tspan><tspan x="115" dy="18">9</tspan><tspan x="115" dy="18">ハ</tspan><tspan x="115" dy="18">1</tspan><tspan x="115" dy="18">ラ</tspan><tspan x="115" dy="18">0</tspan><tspan x="115" dy="18">ワ</tspan><tspan x="115" dy="18">Z</tspan><tspan x="115" dy="18">0</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="9s" begin="-4s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.14">
        <text x="205" y="0">キ<tspan x="205" dy="18">1</tspan><tspan x="205" dy="18">0</tspan><tspan x="205" dy="18">ク</tspan><tspan x="205" dy="18">3</tspan><tspan x="205" dy="18">セ</tspan><tspan x="205" dy="18">1</tspan><tspan x="205" dy="18">ソ</tspan><tspan x="205" dy="18">F</tspan><tspan x="205" dy="18">0</tspan><tspan x="205" dy="18">チ</tspan><tspan x="205" dy="18">1</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="6s" begin="-2.5s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.12">
        <text x="300" y="0">0<tspan x="300" dy="18">ネ</tspan><tspan x="300" dy="18">1</tspan><tspan x="300" dy="18">ノ</tspan><tspan x="300" dy="18">5</tspan><tspan x="300" dy="18">ヒ</tspan><tspan x="300" dy="18">0</tspan><tspan x="300" dy="18">フ</tspan><tspan x="300" dy="18">1</tspan><tspan x="300" dy="18">ヘ</tspan><tspan x="300" dy="18">K</tspan><tspan x="300" dy="18">1</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="8s" begin="-6s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.08">
        <text x="395" y="0">モ<tspan x="395" dy="18">0</tspan><tspan x="395" dy="18">ヤ</tspan><tspan x="395" dy="18">1</tspan><tspan x="395" dy="18">ユ</tspan><tspan x="395" dy="18">8</tspan><tspan x="395" dy="18">ヨ</tspan><tspan x="395" dy="18">0</tspan><tspan x="395" dy="18">リ</tspan><tspan x="395" dy="18">1</tspan><tspan x="395" dy="18">ル</tspan><tspan x="395" dy="18">N</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="5.5s" begin="-0.5s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.08">
        <text x="505" y="0">1<tspan x="505" dy="18">レ</tspan><tspan x="505" dy="18">0</tspan><tspan x="505" dy="18">ロ</tspan><tspan x="505" dy="18">4</tspan><tspan x="505" dy="18">ン</tspan><tspan x="505" dy="18">1</tspan><tspan x="505" dy="18">ア</tspan><tspan x="505" dy="18">0</tspan><tspan x="505" dy="18">ウ</tspan><tspan x="505" dy="18">W</tspan><tspan x="505" dy="18">1</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="7.5s" begin="-3s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.13">
        <text x="610" y="0">テ<tspan x="610" dy="18">1</tspan><tspan x="610" dy="18">0</tspan><tspan x="610" dy="18">ト</tspan><tspan x="610" dy="18">2</tspan><tspan x="610" dy="18">ニ</tspan><tspan x="610" dy="18">0</tspan><tspan x="610" dy="18">ヌ</tspan><tspan x="610" dy="18">J</tspan><tspan x="610" dy="18">1</tspan><tspan x="610" dy="18">ホ</tspan><tspan x="610" dy="18">0</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="6.5s" begin="-5s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.11">
        <text x="700" y="0">0<tspan x="700" dy="18">マ</tspan><tspan x="700" dy="18">1</tspan><tspan x="700" dy="18">ム</tspan><tspan x="700" dy="18">6</tspan><tspan x="700" dy="18">メ</tspan><tspan x="700" dy="18">1</tspan><tspan x="700" dy="18">ケ</tspan><tspan x="700" dy="18">0</tspan><tspan x="700" dy="18">コ</tspan><tspan x="700" dy="18">V</tspan><tspan x="700" dy="18">1</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="8.5s" begin="-2s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.16">
        <text x="790" y="0">シ<tspan x="790" dy="18">0</tspan><tspan x="790" dy="18">ス</tspan><tspan x="790" dy="18">1</tspan><tspan x="790" dy="18">ツ</tspan><tspan x="790" dy="18">9</tspan><tspan x="790" dy="18">ヲ</tspan><tspan x="790" dy="18">0</tspan><tspan x="790" dy="18">エ</tspan><tspan x="790" dy="18">1</tspan><tspan x="790" dy="18">オ</tspan><tspan x="790" dy="18">B</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="6s" begin="-4.5s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.12">
        <text x="860" y="0">1<tspan x="860" dy="18">カ</tspan><tspan x="860" dy="18">0</tspan><tspan x="860" dy="18">キ</tspan><tspan x="860" dy="18">5</tspan><tspan x="860" dy="18">ク</tspan><tspan x="860" dy="18">1</tspan><tspan x="860" dy="18">サ</tspan><tspan x="860" dy="18">0</tspan><tspan x="860" dy="18">タ</tspan><tspan x="860" dy="18">H</tspan><tspan x="860" dy="18">0</tspan></text>
        <animateTransform attributeName="transform" type="translate" values="0 -280;0 280" dur="7s" begin="-1.5s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- scanline -->
    <rect x="0" y="-10" width="900" height="4" fill="#00ff41" opacity="0.07">
      <animate attributeName="y" values="-10;250" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- title block -->
    <g font-family="'Courier New',monospace" text-anchor="middle">
      <text x="450" y="78" font-size="14" fill="#00ff41" opacity="0.9" letter-spacing="2">[ root@github ~ ]# ./initialize --profile mateus_henrique</text>
      <g font-size="46" font-weight="bold" letter-spacing="6">
        <text x="450" y="130" fill="#00e5ff" opacity="0.5">MATEUS HENRIQUE
          <animateTransform attributeName="transform" type="translate" values="0 0;0 0;-3 2;2 -1;0 0;0 0" keyTimes="0;0.66;0.70;0.74;0.78;1" dur="3.2s" repeatCount="indefinite"/>
        </text>
        <text x="450" y="130" fill="#ff2bd6" opacity="0.45">MATEUS HENRIQUE
          <animateTransform attributeName="transform" type="translate" values="0 0;0 0;3 -2;-2 1;0 0;0 0" keyTimes="0;0.40;0.44;0.48;0.52;1" dur="4.1s" repeatCount="indefinite"/>
        </text>
        <text x="450" y="130" fill="#eafff2" filter="url(#glow)">MATEUS HENRIQUE</text>
      </g>
      <text x="450" y="164" font-size="15" fill="#7ee787" letter-spacing="3">&lt;SOFTWARE_ARCHITECT/&gt;   &lt;AI_AUTOMATION/&gt;   &lt;GROWTH_ENGINEER/&gt;</text>
      <rect x="150" y="182" width="600" height="2" fill="url(#lineGrad)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="450" y="210" font-size="13" fill="#8b949e" letter-spacing="2">~/brazil/mg/contagem  ·  uptime: building the future since day one</text>
    </g>
  </g>

  <!-- pulsing border -->
  <rect x="1" y="1" width="898" height="238" rx="14" stroke="#00ff41" stroke-opacity="0.4" fill="none">
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
