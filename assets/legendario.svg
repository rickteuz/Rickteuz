<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow2"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="softg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

  <linearGradient id="shim" gradientUnits="userSpaceOnUse" x1="-860" y1="0" x2="0" y2="0">
    <stop offset="40%" stop-color="#FF4500" stop-opacity="0"/>
    <stop offset="50%" stop-color="#FFB080" stop-opacity="0.65"/>
    <stop offset="60%" stop-color="#FF4500" stop-opacity="0"/>
    <animateTransform attributeName="gradientTransform" type="translate" values="0 0;1720 0" dur="3s" repeatCount="indefinite"/>
  </linearGradient>

  <radialGradient id="bgr" cx="62%" cy="50%" r="55%">
    <stop offset="0%"  stop-color="#1c0800"/>
    <stop offset="60%" stop-color="#0f0400"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </radialGradient>

  <style>
    .border  { animation: bPulse 2.6s ease-in-out infinite; }
    .ahu     { opacity:0; animation: fadeIn .5s  .3s forwards; }
    .motto   { opacity:0; animation: fadeIn .5s  .9s forwards; }
    .memb    { opacity:0; animation: fadeIn .5s 1.5s forwards; }
    .lgtxt   { opacity:0; animation: fadeIn .5s  .5s forwards; }
    .flag-g  { transform-origin: 22px 193px; animation: wave 5s ease-in-out infinite; }
    .ahu-t   { animation: aGlow 2.2s 1s ease-in-out infinite; }
    .sp1     { animation: spark 3.8s 0.0s ease-in-out infinite; }
    .sp2     { animation: spark 3.8s 1.3s ease-in-out infinite; }
    .sp3     { animation: spark 3.8s 2.6s ease-in-out infinite; }
    .sp4     { animation: spark 3.8s 0.8s ease-in-out infinite; }

    @keyframes bPulse { 0%,100%{stroke-opacity:.35} 50%{stroke-opacity:.85} }
    @keyframes fadeIn { to { opacity:1; } }
    @keyframes wave   {
      0%,100% { transform: skewX(0deg) scaleX(1);    }
      30%     { transform: skewX(.9deg) scaleX(1.008); }
      70%     { transform: skewX(-.9deg) scaleX(.993); }
    }
    @keyframes aGlow  { 0%,100%{filter:drop-shadow(0 0 5px #FF4500)}  50%{filter:drop-shadow(0 0 20px #FF7040)} }
    @keyframes spark  { 0%,100%{opacity:0;transform:translateY(0)}  40%{opacity:.9}  100%{opacity:0;transform:translateY(-22px)} }
  </style>
</defs>

<!-- Background -->
<rect width="860" height="220" rx="14" fill="url(#bgr)"/>
<rect width="860" height="220" rx="14" fill="none" stroke="#FF4500" stroke-width="1.8" class="border"/>
<rect x="4" y="4" width="852" height="212" rx="11" fill="none" stroke="#FF4500" stroke-width=".5" stroke-opacity=".15"/>

<!-- ══════════════ LEFT — LOGO LEGENDÁRIOS ══════════════ -->
<g class="flag-g">
  <!-- FLAG SHAPE — orange banner sweeping up-right -->
  <path fill="#FF4500"
    d="M 22,193
       C 18,168 14,135 14,96
       C 14,57  36,26  97,18
       C 148,12 200,30 218,68
       C 232,98 228,134 212,158
       C 196,180 168,192 138,190
       C 88,188  50,191  22,193 Z"/>

  <!-- ── HIKER SILHOUETTE (white) ── -->
  <g fill="white">

    <!-- Walking stick — thin diagonal going up-right from hand -->
    <path d="M 200,18 L 206,22 L 172,82 L 166,78 Z"/>

    <!-- Head -->
    <ellipse cx="143" cy="37" rx="13" ry="14"/>

    <!-- Cap brim (extends right, forward direction) -->
    <path d="M 130,32 C 130,22 140,16 153,19 L 167,25 L 143,34 Z"/>

    <!-- Combined body + backpack silhouette -->
    <!-- Backpack protrudes to the left (figure's back) -->
    <path d="
      M 130,52
      C 118,52 108,57 109,78
      C 110,100 116,120 128,118
      L 158,111
      L 162,52
      C 152,49 141,50 130,52 Z"/>

    <!-- Backpack bottom bump -->
    <path d="M 109,95 C 105,95 100,100 102,112 C 104,120 110,124 118,122 L 128,118 L 126,102 C 118,101 112,97 109,95 Z"/>

    <!-- Right arm reaching up to stick -->
    <path d="M 160,54 L 170,40 L 176,44 L 166,58 Z"/>

    <!-- Left arm swinging forward/down -->
    <path d="M 128,56 L 112,86 L 106,83 L 122,53 Z"/>

    <!-- Left leg — forward stride -->
    <path d="M 128,118 L 112,155 L 94,191 L 84,190 L 86,183 L 104,150 L 122,115 Z"/>
    <!-- Left boot/foot -->
    <path d="M 84,190 L 70,194 L 90,197 L 100,192 Z"/>

    <!-- Right leg — back / push-off -->
    <path d="M 154,113 L 162,150 L 165,188 L 177,187 L 173,148 L 162,111 Z"/>
    <!-- Right boot/foot -->
    <path d="M 165,188 L 178,187 L 184,196 L 162,197 Z"/>

    <!-- Ground mound -->
    <ellipse cx="128" cy="197" rx="52" ry="7"/>
  </g>
</g>

<!-- LEGENDÁRIOS text — below flag, styled to match logo -->
<g class="lgtxt">
  <text x="118" y="213"
    text-anchor="middle"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
    font-weight="900" font-size="17.5" letter-spacing="2.5"
    fill="#FF4500">LEGENDÁRIOS</text>
</g>

<!-- Separator -->
<line x1="248" y1="12" x2="248" y2="208" stroke="#FF4500" stroke-width=".8" stroke-opacity=".25"/>

<!-- ══════════════ RIGHT — BADGE CONTENT ══════════════ -->

<!-- AHU! large animated title -->
<g class="ahu ahu-t">
  <!-- glow layer -->
  <text x="553" y="105"
    text-anchor="middle"
    font-family="'Arial Black',sans-serif"
    font-weight="900" font-size="72" letter-spacing="6"
    fill="#FF4500" filter="url(#glow2)">AHU!</text>
  <!-- crisp top layer -->
  <text x="553" y="105"
    text-anchor="middle"
    font-family="'Arial Black',sans-serif"
    font-weight="900" font-size="72" letter-spacing="6"
    fill="#FF5520">AHU!</text>
  <!-- shimmer sweep -->
  <text x="553" y="105"
    text-anchor="middle"
    font-family="'Arial Black',sans-serif"
    font-weight="900" font-size="72" letter-spacing="6"
    fill="url(#shim)">AHU!</text>
</g>

<!-- Divider line under AHU -->
<g class="motto">
  <line x1="295" y1="118" x2="810" y2="118" stroke="#FF4500" stroke-width=".6" stroke-opacity=".4"/>
</g>

<!-- Motto -->
<g class="motto">
  <text x="553" y="140"
    text-anchor="middle"
    font-family="Arial,sans-serif"
    font-weight="700" font-size="15" letter-spacing="3"
    fill="#FF8050">Amor  ✦  Honra  ✦  Unidade</text>
</g>

<!-- Member number badge -->
<g class="memb">
  <rect x="376" y="154" width="354" height="40" rx="8"
    fill="#FF4500" fill-opacity=".1" stroke="#FF4500" stroke-width=".9" stroke-opacity=".55"/>
  <text x="553" y="179"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="15" letter-spacing="2"
    fill="#FF9060">LEGENDÁRIO <tspan font-weight="bold" font-size="18" fill="#FF5520">#169810</tspan></text>
</g>

<!-- Floating sparks -->
<circle cx="278" cy="145" r="2.2" fill="#FF4500" class="sp1" filter="url(#softg)"/>
<circle cx="822" cy="60"  r="1.8" fill="#FF8050" class="sp2" filter="url(#softg)"/>
<circle cx="720" cy="185" r="2"   fill="#FF4500" class="sp3" filter="url(#softg)"/>
<circle cx="320" cy="50"  r="1.5" fill="#FF6030" class="sp4" filter="url(#softg)"/>
</svg>
