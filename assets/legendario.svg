<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- orange glow filter -->
  <filter id="og" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="og2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- background gradient -->
  <radialGradient id="bgr" cx="50%" cy="50%" r="55%">
    <stop offset="0%"   stop-color="#1a0a00"/>
    <stop offset="60%"  stop-color="#0d0600"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </radialGradient>

  <!-- crown gradient -->
  <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#FFD060"/>
    <stop offset="40%"  stop-color="#FF8C00"/>
    <stop offset="100%" stop-color="#FF4500"/>
  </linearGradient>

  <!-- shimmer gradient (animated) -->
  <linearGradient id="shim" x1="-1" y1="0" x2="2" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0"/>
    <stop offset="45%"  stop-color="#FFD060" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#fff"    stop-opacity="0.55"/>
    <stop offset="55%"  stop-color="#FFD060" stop-opacity="0"/>
    <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    <animateTransform attributeName="gradientTransform" type="translate"
      values="-860 0;860 0" dur="3.2s" repeatCount="indefinite"/>
  </linearGradient>

  <!-- border pulse gradient -->
  <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#FF8C00"/>
    <stop offset="50%"  stop-color="#FFD060"/>
    <stop offset="100%" stop-color="#FF4500"/>
  </linearGradient>

  <clipPath id="badgeClip">
    <rect x="1" y="1" width="858" height="218" rx="16"/>
  </clipPath>

  <style>
    /* rotating orbit ring */
    .orbit { transform-origin: 110px 110px; animation: spin 8s linear infinite; }
    .orbit2{ transform-origin: 110px 110px; animation: spin 12s linear infinite reverse; }

    /* pulsing glow behind crown */
    .halo  { animation: halo 2.4s ease-in-out infinite; transform-origin: 110px 110px; }

    /* badge border pulse */
    .border-ring { animation: borderPulse 2.8s ease-in-out infinite; }

    /* text shimmer block */
    .shimmer { animation: textAppear 0.6s 0.2s forwards; opacity: 0; }
    .s2      { animation: textAppear 0.6s 0.5s forwards; opacity: 0; }
    .s3      { animation: textAppear 0.6s 0.9s forwards; opacity: 0; }
    .s4      { animation: textAppear 0.6s 1.3s forwards; opacity: 0; }

    /* star twinkle */
    .star1 { animation: twinkle 2.1s 0.3s ease-in-out infinite; }
    .star2 { animation: twinkle 1.8s 0.9s ease-in-out infinite; }
    .star3 { animation: twinkle 2.5s 0.0s ease-in-out infinite; }
    .star4 { animation: twinkle 1.6s 1.5s ease-in-out infinite; }

    /* floating particles */
    .p1 { animation: floatUp 4s 0.0s ease-in-out infinite; }
    .p2 { animation: floatUp 4s 1.0s ease-in-out infinite; }
    .p3 { animation: floatUp 4s 2.0s ease-in-out infinite; }
    .p4 { animation: floatUp 4s 3.0s ease-in-out infinite; }

    /* crown glow pulse */
    .crown-glow { animation: crownPulse 2s ease-in-out infinite; }

    @keyframes spin        { to { transform: rotate(360deg); } }
    @keyframes halo        { 0%,100%{opacity:.25;transform:scale(1)}   50%{opacity:.55;transform:scale(1.12)} }
    @keyframes borderPulse { 0%,100%{stroke-opacity:.5}                50%{stroke-opacity:1} }
    @keyframes textAppear  { to { opacity: 1; } }
    @keyframes twinkle     { 0%,100%{opacity:.3;transform:scale(.8)}   50%{opacity:1;transform:scale(1.3)} }
    @keyframes floatUp     { 0%{opacity:0;transform:translateY(8px)} 30%{opacity:.8} 100%{opacity:0;transform:translateY(-18px)} }
    @keyframes crownPulse  { 0%,100%{filter:drop-shadow(0 0 6px #FF8C00)} 50%{filter:drop-shadow(0 0 18px #FFD060)} }
  </style>
</defs>

<!-- background -->
<rect x="0" y="0" width="860" height="220" rx="16" fill="url(#bgr)"/>

<!-- subtle grid pattern -->
<g clip-path="url(#badgeClip)" opacity="0.06">
  <g stroke="#FF8C00" stroke-width="0.5">
    <line x1="0"   y1="20"  x2="860" y2="20"/>
    <line x1="0"   y1="40"  x2="860" y2="40"/>
    <line x1="0"   y1="60"  x2="860" y2="60"/>
    <line x1="0"   y1="80"  x2="860" y2="80"/>
    <line x1="0"   y1="100" x2="860" y2="100"/>
    <line x1="0"   y1="120" x2="860" y2="120"/>
    <line x1="0"   y1="140" x2="860" y2="140"/>
    <line x1="0"   y1="160" x2="860" y2="160"/>
    <line x1="0"   y1="180" x2="860" y2="180"/>
    <line x1="0"   y1="200" x2="860" y2="200"/>
    <line x1="80"  y1="0"   x2="80"  y2="220"/>
    <line x1="160" y1="0"   x2="160" y2="220"/>
    <line x1="240" y1="0"   x2="240" y2="220"/>
    <line x1="320" y1="0"   x2="320" y2="220"/>
    <line x1="400" y1="0"   x2="400" y2="220"/>
    <line x1="480" y1="0"   x2="480" y2="220"/>
    <line x1="560" y1="0"   x2="560" y2="220"/>
    <line x1="640" y1="0"   x2="640" y2="220"/>
    <line x1="720" y1="0"   x2="720" y2="220"/>
    <line x1="800" y1="0"   x2="800" y2="220"/>
  </g>
</g>

<!-- ── LEFT EMBLEM SECTION ─────────────────────────────────── -->
<!-- halo / glow behind crown -->
<ellipse cx="110" cy="112" rx="68" ry="68" fill="#FF6400" class="halo" opacity=".28"/>

<!-- outer orbit ring 1 (dashed, rotating) -->
<g class="orbit">
  <circle cx="110" cy="110" r="80" fill="none" stroke="#FF8C00" stroke-width="1.2"
    stroke-dasharray="8 12" stroke-opacity=".5"/>
  <!-- orbit dots -->
  <circle cx="110" cy="30"  r="3.5" fill="#FFD060" opacity=".9"/>
  <circle cx="110" cy="190" r="3.5" fill="#FFD060" opacity=".9"/>
  <circle cx="30"  cy="110" r="3.5" fill="#FF8C00" opacity=".7"/>
  <circle cx="190" cy="110" r="3.5" fill="#FF8C00" opacity=".7"/>
</g>

<!-- outer orbit ring 2 (dotted, counter-rotating) -->
<g class="orbit2">
  <circle cx="110" cy="110" r="88" fill="none" stroke="#FF4500" stroke-width=".8"
    stroke-dasharray="3 18" stroke-opacity=".35"/>
  <circle cx="110" cy="22"  r="2.5" fill="#FF4500" opacity=".6"/>
  <circle cx="198" cy="110" r="2.5" fill="#FF4500" opacity=".6"/>
  <circle cx="110" cy="198" r="2.5" fill="#FF4500" opacity=".6"/>
  <circle cx="22"  cy="110" r="2.5" fill="#FF4500" opacity=".6"/>
</g>

<!-- solid inner circle -->
<circle cx="110" cy="110" r="64" fill="#12080000"/>
<circle cx="110" cy="110" r="64" fill="none" stroke="#FF8C00" stroke-width="1.5" stroke-opacity=".6"/>

<!-- ── CROWN PATH ────────────────────────── -->
<!-- base bar -->
<g class="crown-glow" filter="url(#og)">
  <rect x="72" y="142" width="76" height="10" rx="4" fill="url(#cg)"/>
  <!-- crown body: 5-point silhouette -->
  <!-- left outer spike -->
  <polygon points="72,142  80,90   93,118  110,78  127,118  140,90  148,142" fill="url(#cg)"/>
  <!-- left inner cutout (to give crown shape) -->
  <polygon points="80,142  87,108  97,128  110,142  123,128  133,108  140,142" fill="#1a0a00"/>
  <!-- center jewel -->
  <circle cx="110" cy="108" r="7" fill="#FFD060" filter="url(#softglow)"/>
  <circle cx="110" cy="108" r="4" fill="#fff" opacity=".8"/>
  <!-- left jewel -->
  <circle cx="84"  cy="126" r="4.5" fill="#FF8C00" filter="url(#softglow)"/>
  <circle cx="84"  cy="126" r="2.5" fill="#FFD060" opacity=".7"/>
  <!-- right jewel -->
  <circle cx="136" cy="126" r="4.5" fill="#FF8C00" filter="url(#softglow)"/>
  <circle cx="136" cy="126" r="2.5" fill="#FFD060" opacity=".7"/>
  <!-- top left spike dot -->
  <circle cx="80"  cy="90"  r="4" fill="#FFD060"/>
  <!-- top center dot -->
  <circle cx="110" cy="78"  r="5" fill="#FFD060" filter="url(#softglow)"/>
  <!-- top right spike dot -->
  <circle cx="140" cy="90"  r="4" fill="#FFD060"/>
</g>

<!-- shimmer sweep over crown -->
<rect x="55" y="68" width="110" height="90" rx="4" fill="url(#shim)" opacity=".6"/>

<!-- floating particles around crown -->
<circle cx="68"  cy="75"  r="2" fill="#FFD060" class="p1"/>
<circle cx="152" cy="82"  r="1.8" fill="#FF8C00" class="p2"/>
<circle cx="82"  cy="160" r="1.5" fill="#FFD060" class="p3"/>
<circle cx="140" cy="156" r="2" fill="#FF8C00" class="p4"/>

<!-- ── RIGHT TEXT SECTION ──────────────────────────────────── -->
<!-- stars decorating text area -->
<text x="248" y="52"  font-size="14" fill="#FFD060" class="star1" font-family="serif">★</text>
<text x="830" y="52"  font-size="14" fill="#FFD060" class="star2" font-family="serif">★</text>
<text x="248" y="182" font-size="14" fill="#FF8C00" class="star3" font-family="serif">★</text>
<text x="830" y="182" font-size="14" fill="#FF8C00" class="star4" font-family="serif">★</text>

<!-- thin separator line between emblem and text -->
<line x1="218" y1="30" x2="218" y2="190" stroke="#FF8C00" stroke-width="1" stroke-opacity=".3"/>

<!-- eyebrow label -->
<g class="shimmer">
  <text x="534" y="70" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="12" letter-spacing="5"
    fill="#FF8C00" font-weight="bold">✦ COMUNIDADE ✦</text>
</g>

<!-- main title LEGENDÁRIOS -->
<g class="s2">
  <text x="534" y="125" text-anchor="middle"
    font-family="Arial Black,Arial,sans-serif" font-size="54" font-weight="900"
    letter-spacing="4" fill="url(#cg)" filter="url(#og2)">LEGENDÁRIOS</text>
  <!-- shimmer sweep on title -->
  <text x="534" y="125" text-anchor="middle"
    font-family="Arial Black,Arial,sans-serif" font-size="54" font-weight="900"
    letter-spacing="4" fill="url(#shim)">LEGENDÁRIOS</text>
</g>

<!-- member number + tag -->
<g class="s3">
  <rect x="380" y="140" width="308" height="32" rx="6" fill="#FF6400" fill-opacity=".12" stroke="#FF8C00" stroke-width=".8" stroke-opacity=".5"/>
  <text x="534" y="161" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="15" letter-spacing="3"
    fill="#FFD060">MEMBRO Nº <tspan font-weight="bold" font-size="17">#169810</tspan></text>
</g>

<!-- bottom tagline -->
<g class="s4">
  <text x="534" y="195" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="12" letter-spacing="2"
    fill="#FF8C00" opacity=".8">vivendo com propósito · deixando um legado</text>
</g>

<!-- pulsing border -->
<rect x="1.5" y="1.5" width="857" height="217" rx="15.5"
  fill="none" stroke="url(#borderGrad)" stroke-width="2" class="border-ring"/>

<!-- inner subtle border -->
<rect x="4" y="4" width="852" height="212" rx="14"
  fill="none" stroke="#FF4500" stroke-width=".5" stroke-opacity=".2"/>
</svg>
