<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#00471f"/>
    <stop offset="1" stop-color="#00ff41"/>
  </linearGradient>
  <clipPath id="barClip">
    <rect id="barRect" x="31" y="302" width="0" height="10" rx="4"/>
  </clipPath>
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }
    .prompt { fill: #00ff41; font-weight: bold; }
    .cmd    { fill: #e6edf3; }
    .out    { fill: #9da7b3; }
    .hi     { fill: #eafff2; font-weight: bold; }
    .blue   { fill: #79c0ff; }
    .green  { fill: #7ee787; font-weight: bold; }
    .ok     { fill: #00ff41; font-weight: bold; }

    /* staggered line reveals */
    .l0  { opacity:0; animation: show .05s  .3s  forwards; }
    .l1  { opacity:0; animation: show .05s  .9s  forwards; }
    .l2  { opacity:0; animation: show .05s 1.6s  forwards; }
    .l3  { opacity:0; animation: show .05s 2.2s  forwards; }
    .l4  { opacity:0; animation: show .05s 2.9s  forwards; }
    .l5  { opacity:0; animation: show .05s 3.5s  forwards; }
    .l6  { opacity:0; animation: show .05s 4.2s  forwards; }
    .l7  { opacity:0; animation: show .05s 4.8s  forwards; }
    .l8  { opacity:0; animation: show .05s 5.5s  forwards; }
    .l9  { opacity:0; animation: show .05s 6.1s  forwards; }
    .l10 { opacity:0; animation: show .05s 6.6s  forwards; }
    .l11 { opacity:0; animation: show .05s 7.2s  forwards; }
    .l12 { opacity:0; animation: show .05s 8.6s  forwards; }
    .l13 { opacity:0; animation: show .05s 9.1s  forwards; }
    .l14 { opacity:0; animation: show .05s 9.7s  forwards; }
    .l15 { opacity:0; animation: show .05s 10.2s forwards; }

    /* progress bar fill */
    #barRect { animation: fillBar 1.3s 7.2s forwards; }

    /* blinking cursor */
    .cursor { animation: blink 1.1s 10.4s step-end infinite; opacity:0; }

    /* pulsing status dot */
    .dot { animation: pulse 1.6s 10.4s ease-in-out infinite; opacity:0; }

    @keyframes show    { to { opacity: 1; } }
    @keyframes fillBar { from { width: 0; } to { width: 298px; } }
    @keyframes blink   { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes pulse   { 0%,100% { opacity:1; r:5px; } 50% { opacity:.6; r:7px; } }
  </style>
</defs>

<!-- window background -->
<rect x=".5" y=".5" width="859" height="459" rx="12" fill="#0d1117" stroke="#30363d"/>
<rect x=".5" y=".5" width="859" height="459" rx="12" fill="none" stroke="#00ff41" stroke-opacity=".22"/>

<!-- title bar -->
<rect x="1" y="1" width="858" height="36" rx="11" fill="#161b22"/>
<rect x="1" y="20" width="858" height="17" fill="#161b22"/>
<circle cx="26" cy="18.5" r="6" fill="#ff5f56"/>
<circle cx="48" cy="18.5" r="6" fill="#ffbd2e"/>
<circle cx="70" cy="18.5" r="6" fill="#27c93f"/>
<text x="430" y="23.5" text-anchor="middle" class="mono" font-size="12.5" fill="#8b949e">mateus@hgtech: ~/mission — bash</text>

<!-- ─── LINE 0: prompt $ whoami ─── -->
<g class="l0 mono" font-size="14.5">
  <text x="28" y="64"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> whoami</tspan></text>
</g>

<!-- ─── LINE 1: result whoami ─── -->
<g class="l1 mono" font-size="14.5">
  <text x="28" y="86"><tspan class="hi">Mateus Henrique</tspan><tspan class="out"> · Engenheiro de IA Generativa | Arquiteto de Software</tspan></text>
</g>

<!-- ─── LINE 2: prompt cat stack ─── -->
<g class="l2 mono" font-size="14.5">
  <text x="28" y="116"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> cat ./stack.txt</tspan></text>
</g>

<!-- ─── LINE 3: result stack ─── -->
<g class="l3 mono" font-size="14.5">
  <text x="28" y="138"><tspan class="blue">TypeScript · Next.js · Node.js · React · Python · SQL · Docker · n8n · Make</tspan></text>
</g>

<!-- ─── LINE 4: prompt ls projects ─── -->
<g class="l4 mono" font-size="14.5">
  <text x="28" y="168"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> ls ./projects/</tspan></text>
</g>

<!-- ─── LINE 5: result projects ─── -->
<g class="l5 mono" font-size="14.5">
  <text x="28" y="190"><tspan class="green">VOX-Solutions/</tspan><tspan class="out">    </tspan><tspan class="green">HG-Tech/</tspan><tspan class="out">    </tspan><tspan class="green">HG-Hub/</tspan></text>
</g>

<!-- ─── LINE 6: prompt cat traffic ─── -->
<g class="l6 mono" font-size="14.5">
  <text x="28" y="220"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> cat ./traffic.cfg</tspan></text>
</g>

<!-- ─── LINE 7: result traffic ─── -->
<g class="l7 mono" font-size="14.5">
  <text x="28" y="242">
    <tspan fill="#1877F2" font-weight="bold">Meta Ads</tspan>
    <tspan class="out"> · </tspan>
    <tspan fill="#4285F4" font-weight="bold">Google Ads</tspan>
    <tspan class="out"> · Gestão de tráfego pago &amp; Growth Engineering</tspan>
  </text>
</g>

<!-- ─── LINE 8: prompt deploy ─── -->
<g class="l8 mono" font-size="14.5">
  <text x="28" y="272"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> ./deploy_mission.sh</tspan></text>
</g>

<!-- ─── LINE 9: "compilando" ─── -->
<g class="l9 mono" font-size="14.5">
  <text x="28" y="294" class="out">Compilando automações de alto impacto...</text>
</g>

<!-- ─── LINE 10: progress bar track ─── -->
<g class="l10">
  <rect x="28" y="302" width="304" height="10" rx="5" fill="#161b22" stroke="#30363d" stroke-width=".8"/>
  <rect x="31" y="305" width="298" height="4" rx="2" fill="url(#bar)" clip-path="url(#barClip)"/>
</g>

<!-- ─── LINE 11: 100% label (appears when bar done) ─── -->
<g class="l11 mono" font-size="14.5">
  <text x="344" y="312" class="ok">100%</text>
</g>

<!-- ─── LINE 12: success ─── -->
<g class="l12 mono" font-size="14.5">
  <text x="28" y="336"><tspan class="ok">[ ✓ ]</tspan><tspan fill="#e6edf3"> Missão: complexidade → automação escalável de alto impacto</tspan></text>
</g>

<!-- ─── LINE 13: prompt status ─── -->
<g class="l13 mono" font-size="14.5">
  <text x="28" y="366"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> status --now</tspan></text>
</g>

<!-- ─── LINE 14: ONLINE status ─── -->
<g class="l14">
  <circle cx="36" cy="393" r="5" class="dot" fill="#00ff41"/>
  <text x="50" y="397" class="mono" font-size="14.5"><tspan class="ok">ONLINE</tspan><tspan fill="#e6edf3"> — aberto a novos desafios &amp; colaborações</tspan></text>
</g>

<!-- ─── LINE 15: next prompt + cursor ─── -->
<g class="l15 mono" font-size="14.5">
  <text x="28" y="424"><tspan class="prompt">mateus@hgtech</tspan><tspan fill="#e6edf3">:</tspan><tspan fill="#79c0ff">~</tspan><tspan class="prompt">$</tspan><tspan class="cmd"> </tspan></text>
</g>
<rect x="200" y="410" width="9" height="16" rx="1" fill="#00ff41" class="cursor"/>
</svg>
