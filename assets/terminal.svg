<svg width="860" height="444" viewBox="0 0 860 444" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#006622"/>
      <stop offset="1" stop-color="#00ff41"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#00ff41" opacity="0.04"/>
    </pattern>
    <clipPath id="winFrame"><rect x="1" y="1" width="858" height="442" rx="12"/></clipPath>
    <clipPath id="t1"><rect x="180" y="51" width="0" height="20"><animate attributeName="width" from="0" to="60" begin="0.4s" dur="0.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="t2"><rect x="180" y="115" width="0" height="20"><animate attributeName="width" from="0" to="142" begin="2.0s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="t3"><rect x="180" y="179" width="0" height="20"><animate attributeName="width" from="0" to="130" begin="3.8s" dur="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="t4"><rect x="180" y="243" width="0" height="20"><animate attributeName="width" from="0" to="176" begin="5.4s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="t5"><rect x="180" y="359" width="0" height="20"><animate attributeName="width" from="0" to="115" begin="8.9s" dur="0.6s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="859" height="443" rx="12" fill="#0d1117" stroke="#30363d"/>
  <rect x="0.5" y="0.5" width="859" height="443" rx="12" fill="none" stroke="#00ff41" stroke-opacity="0.25"/>

  <g clip-path="url(#winFrame)">
    <!-- title bar -->
    <rect x="1" y="1" width="858" height="36" rx="11" fill="#161b22"/>
    <rect x="1" y="20" width="858" height="17" fill="#161b22"/>
    <circle cx="26" cy="18.5" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="18.5" r="6" fill="#ffbd2e"/>
    <circle cx="70" cy="18.5" r="6" fill="#27c93f"/>
    <text x="430" y="23" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#8b949e">mateus@hgtech: ~/mission — bash</text>

    <!-- CRT scanlines -->
    <rect x="1" y="37" width="858" height="406" fill="url(#scan)"/>

    <g font-family="'Courier New',monospace" font-size="15">
      <!-- $ whoami -->
      <g opacity="0"><text x="28" y="66" fill="#00ff41" font-weight="bold">mateus@hgtech:~$</text><set attributeName="opacity" to="1" begin="0.2s"/></g>
      <text x="180" y="66" fill="#e6edf3" clip-path="url(#t1)">whoami</text>
      <g opacity="0">
        <text x="28" y="92"><tspan fill="#eafff2" font-weight="bold">Mateus Henrique</tspan><tspan fill="#9da7b3"> — Software Architect &amp; AI Automation Specialist</tspan></text>
        <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
      </g>

      <!-- $ cat ./stack.txt -->
      <g opacity="0"><text x="28" y="130" fill="#00ff41" font-weight="bold">mateus@hgtech:~$</text><set attributeName="opacity" to="1" begin="1.8s"/></g>
      <text x="180" y="130" fill="#e6edf3" clip-path="url(#t2)">cat ./stack.txt</text>
      <g opacity="0">
        <text x="28" y="156" fill="#79c0ff">TypeScript · Next.js · Node.js · React · Python · SQL · Docker · n8n · Make</text>
        <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.3s" fill="freeze"/>
      </g>

      <!-- $ ls ./projects/ -->
      <g opacity="0"><text x="28" y="194" fill="#00ff41" font-weight="bold">mateus@hgtech:~$</text><set attributeName="opacity" to="1" begin="3.6s"/></g>
      <text x="180" y="194" fill="#e6edf3" clip-path="url(#t3)">ls ./projects/</text>
      <g opacity="0">
        <text x="28" y="220" fill="#7ee787" font-weight="bold">VOX-Solutions/    HG-Tech/    G.Nove-Hub/    Belle/</text>
        <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.3s" fill="freeze"/>
      </g>

      <!-- $ ./deploy_mission.sh -->
      <g opacity="0"><text x="28" y="258" fill="#00ff41" font-weight="bold">mateus@hgtech:~$</text><set attributeName="opacity" to="1" begin="5.2s"/></g>
      <text x="180" y="258" fill="#e6edf3" clip-path="url(#t4)">./deploy_mission.sh</text>
      <g opacity="0">
        <text x="28" y="284" fill="#9da7b3">Compilando automações escaláveis...</text>
        <animate attributeName="opacity" from="0" to="1" begin="6.4s" dur="0.3s" fill="freeze"/>
      </g>

      <!-- progress bar -->
      <g opacity="0">
        <rect x="28" y="296" width="304" height="14" rx="7" fill="#161b22" stroke="#30363d"/>
        <set attributeName="opacity" to="1" begin="6.6s"/>
      </g>
      <rect x="31" y="299" width="0" height="8" rx="4" fill="url(#barGrad)">
        <animate attributeName="width" from="0" to="298" begin="6.7s" dur="1.2s" fill="freeze"/>
      </rect>
      <g opacity="0"><text x="344" y="308" fill="#00ff41" font-weight="bold">100%</text><set attributeName="opacity" to="1" begin="7.9s"/></g>

      <g opacity="0">
        <text x="28" y="336"><tspan fill="#00ff41" font-weight="bold">[ ✓ ]</tspan><tspan fill="#e6edf3"> Missão: problemas complexos → automações escaláveis de alto impacto</tspan></text>
        <animate attributeName="opacity" from="0" to="1" begin="8.1s" dur="0.3s" fill="freeze"/>
      </g>

      <!-- $ status --now -->
      <g opacity="0"><text x="28" y="374" fill="#00ff41" font-weight="bold">mateus@hgtech:~$</text><set attributeName="opacity" to="1" begin="8.7s"/></g>
      <text x="180" y="374" fill="#e6edf3" clip-path="url(#t5)">status --now</text>
      <g opacity="0">
        <circle cx="35" cy="395" r="5" fill="#00ff41">
          <animate attributeName="r" values="4;6;4" dur="1.6s" begin="9.6s" repeatCount="indefinite"/>
        </circle>
        <text x="50" y="400"><tspan fill="#00ff41" font-weight="bold">ONLINE</tspan><tspan fill="#e6edf3"> — aberto a novos desafios e colaborações</tspan></text>
        <animate attributeName="opacity" from="0" to="1" begin="9.6s" dur="0.3s" fill="freeze"/>
      </g>

      <!-- blinking cursor -->
      <g opacity="0">
        <rect x="482" y="387" width="9" height="17" fill="#00ff41">
          <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="9.8s" repeatCount="indefinite"/>
        </rect>
        <set attributeName="opacity" to="1" begin="9.8s"/>
      </g>
    </g>
  </g>
</svg>
